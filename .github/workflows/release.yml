name: Build & Release

# Triggers on every push to main (draft release) or a version tag (public release)
on:
  push:
    tags:
      - 'v*'           # e.g. v1.2.0  → creates a public GitHub Release
    branches:
      - main           # optional: build on every push for testing

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 4. Build & publish ────────────────────────────────────────────────
      #    --publish always  → uploads artifacts to GitHub Releases
      #    --publish never   → just builds locally (for branch pushes)
      - name: Build & Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by GitHub Actions
          CSC_LINK: ${{ secrets.CSC_LINK }}        # macOS: base64-encoded .p12 cert (optional)
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}        # Windows: code signing (optional)
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            npm run release
          else
            npm run build
          fi
        shell: bash

      # ── 5. Upload artifacts (for non-tag builds / debugging) ──────────────
      - name: Upload build artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: LunchMoneyImporter-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
          retention-days: 7
