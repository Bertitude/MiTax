name: Build & Release

# Only triggers on version tags pushed to main — dev branch changes are ignored
on:
  push:
    tags:
      - 'v*'           # e.g. v1.1.2  → creates a public GitHub Release

permissions:
  contents: write   # required to create GitHub Releases and upload assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 4. Build & publish to GitHub Releases ────────────────────────────
      - name: Build & Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by GitHub Actions
          CSC_IDENTITY_AUTO_DISCOVERY: "false"    # skip code signing (add certs later if needed)
        run: npm run release
        shell: bash
